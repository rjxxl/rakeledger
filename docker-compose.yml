services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: rakeledger
      POSTGRES_PASSWORD: rakeledger_dev
      POSTGRES_DB: rakeledger
    ports:
      - "5432:5432"
    volumes:
      - rakeledger_pg_data:/var/lib/postgresql/data

volumes:
  rakeledger_pg_data:
